$kind: http-request
name: Login
url: "{{base_url}}/api/v1/auth/login"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \  \"email\": \"admin@test.com\",\r

    \  \"password\": \"12345678\"\r

    }"
scripts:
